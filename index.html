<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Boys Golf App</title>
  <style>
    :root{--maroon:#76001f;--maroon2:#4f0018;--gold:#d9ad43;--gold2:#f6d979;--cream:#fffaf0;--ink:#211720;--muted:#756872;--line:#eadfcd;--card:#fff;--green:#217a3a;--blue:#1d5d8f;--orange:#aa6500;--red:#a7271c;--shadow:0 16px 38px rgba(80,0,24,.12)}
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fffaf0 0,#faf7f1 260px,#fff 100%)}
    header{background:linear-gradient(120deg,var(--maroon2),var(--maroon),#8c1230);color:#fff;border-bottom:5px solid var(--gold);box-shadow:var(--shadow)}
    .top{display:flex;align-items:center;gap:20px;padding:18px 28px;max-width:1440px;margin:auto}.logo{width:104px;height:104px;object-fit:contain;filter:drop-shadow(0 6px 8px rgba(0,0,0,.22))}.brand h1{margin:0;color:var(--gold2);font-family:Georgia,serif;font-size:42px;letter-spacing:2px}.brand h2{margin:4px 0 0;font-family:Georgia,serif;font-size:22px;letter-spacing:3px}.actions{margin-left:auto;display:flex;gap:12px;flex-wrap:wrap}.btn{border:1px solid var(--maroon);background:var(--maroon);color:white;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer}.btn.gold{background:linear-gradient(#f8db79,#d9ad43);color:#3a0818;border-color:#d9ad43}.btn.ghost{background:white;color:var(--maroon)}.btn.light{background:#fff8e8;color:var(--maroon);border-color:var(--gold)}.btn.small{padding:6px 9px;font-size:12px}.btn:disabled{opacity:.45;cursor:not-allowed}.shell{display:grid;grid-template-columns:240px 1fr;gap:22px;max-width:1440px;margin:22px auto;padding:0 18px}.side{background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:14px;position:sticky;top:12px;height:calc(100vh - 24px)}.nav button{display:block;width:100%;text-align:left;border:0;background:transparent;padding:13px;border-radius:8px;font-size:16px;cursor:pointer}.nav button.active{background:linear-gradient(90deg,var(--maroon),#8c1230);color:white;font-weight:900}.motto{position:absolute;bottom:28px;left:22px;right:22px;text-align:center;border-top:2px solid var(--gold);border-bottom:2px solid var(--gold);padding:14px 0}.motto b{font-family:Georgia,serif;color:var(--maroon);font-size:23px;letter-spacing:2px}.main{min-width:0}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:18px}.span12{grid-column:span 12}.span9{grid-column:span 9}.span8{grid-column:span 8}.span6{grid-column:span 6}.span4{grid-column:span 4}.span3{grid-column:span 3}h3{margin:0 0 14px;color:var(--maroon);font-size:21px}.big{font-size:31px;font-weight:900}.muted{color:var(--muted)}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.split{display:flex;justify-content:space-between;gap:12px;align-items:center}.stat{border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center;background:#fffefa}.stat b{display:block;font-size:30px}.pill{display:inline-block;border-radius:999px;padding:4px 9px;background:#f7eedb;color:#7a4b00;font-size:12px;font-weight:900}.ok{background:#e7f4e7;color:var(--green)}.blue{background:#e6f1fb;color:var(--blue)}.warn{background:#fff1cc;color:var(--orange)}.danger{background:#ffe7e4;color:var(--red)}input,select,textarea{width:100%;padding:10px;border:1px solid #d8cab7;border-radius:8px;font-size:15px;background:white}label{font-weight:900;color:#4c3440;font-size:13px}.form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end}.item{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);align-items:center}.item small{color:var(--muted)}.tee,.pair,.week{border:1px solid var(--line);border-radius:10px;margin:9px 0;padding:12px;background:#fffefa}.pair h4,.tee h4,.week h4{margin:0 0 7px;color:var(--maroon)}table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left}th{background:#fff5df;color:var(--maroon)}.matrix td,.matrix th{text-align:center}.matrix th:first-child,.matrix td:first-child{text-align:left}.hidden{display:none!important}.mobileTabs{display:none}.notice{background:linear-gradient(90deg,#fff8e8,#fff);border:1px solid var(--gold);border-radius:10px;padding:12px;color:#4c3440}.empty{padding:18px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:10px}.footerBtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.daybox{min-height:96px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:8px}.daybox .num{font-weight:900;color:var(--maroon)}.daybox.off{opacity:.35;background:#fafafa}.tag{display:block;margin:5px 0;padding:3px 5px;border-radius:7px;font-size:11px;font-weight:900;background:#fff1cc;color:#7a4b00}.flow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.flow .card{padding:14px}.progress{height:8px;background:#f3e7d4;border-radius:999px;overflow:hidden}.progress b{display:block;height:100%;background:linear-gradient(90deg,var(--maroon),var(--gold));width:50%}.toastWrap{position:fixed;right:18px;bottom:18px;z-index:9999;display:flex;flex-direction:column;gap:10px}.toast{background:#fff;border:1px solid var(--gold);border-left:6px solid var(--maroon);box-shadow:var(--shadow);border-radius:10px;padding:12px 14px;min-width:240px;max-width:340px;font-weight:800;color:var(--ink);animation:toastIn .18s ease-out}.toast.ok{border-left-color:var(--green)}.toast.warn{border-left-color:var(--orange)}.toast.error{border-left-color:var(--red)}@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@media(max-width:950px){.top{padding:12px;gap:12px}.logo{width:72px;height:72px}.brand h1{font-size:25px}.brand h2{font-size:14px}.actions{width:100%;margin-left:0}.shell{display:block;margin:12px auto;padding:0 10px}.side{display:none}.mobileTabs{display:flex;overflow:auto;gap:8px;margin-bottom:12px}.mobileTabs button{white-space:nowrap}.span9,.span8,.span6,.span4,.span3{grid-column:span 12}.flow{grid-template-columns:1fr}.form{grid-template-columns:1fr}.card{padding:14px}.cal{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header><div class="top"><img class="logo" src="tashua_knolls_logo_150w.png" alt="Tashua Knolls G.C. logo"><div class="brand"><h1>The Boys</h1><h2>Golf App</h2></div><div class="actions"></div></div></header>
<div class="shell"><aside class="side"><nav class="nav" id="nav"></nav><div class="motto"><b>THE BOYS</b><p><i>From the first tee<br>to the final tab<br>at the Nest!</i></p><small class="muted">Version 7.2</small></div></aside><main class="main"><div class="mobileTabs nav" id="mobileNav"></div><section id="view"></section></main></div>
<div id="toastWrap" class="toastWrap" aria-live="polite"></div><script src="app.js"></script>
</body>
</html>
